services:
  - type: web
    name: dlya-svoikh-server
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dlya-svoikh-db
          property: connectionString
      - key: CLIENT_URL
        value: https://prideman2022.github.io

databases:
  - name: dlya-svoikh-db
    plan: free
    databaseName: dlya_svoikh
    user: dlya_svoikh_user
